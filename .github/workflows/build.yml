name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  stm32-build:
    name: STM32 Firmware Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arm-none-eabi-gcc
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -G Ninja -B build -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake

      - name: Build
        run: cmake --build build
