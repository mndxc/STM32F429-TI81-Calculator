name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  stm32-build:
    name: STM32 Firmware Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arm-none-eabi-gcc
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -G Ninja -B build -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake

      - name: Build
        run: cmake --build build

  host-tests:
    name: Host Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Configure CMake
        run: cmake -G Ninja -B build-tests -DPROJECT_BUILD_TESTS=ON

      - name: Build and Run Tests
        run: |
          cmake --build build-tests --target test_calc_engine
          ./build-tests/App/Tests/test_calc_engine
